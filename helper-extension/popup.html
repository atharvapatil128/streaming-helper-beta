<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streaming Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ── Not-connected / sign-in view ──────────────────────────────────── -->
  <div id="view-signin" class="popup view hidden">

    <div class="header">
      <img class="logo" src="icons/helper-active.svg" alt="" aria-hidden="true" />
      <div class="header-text">
        <div class="title">Streaming Helper</div>
      </div>
    </div>

    <p class="desc">
      Connect your account to show recommendations in the helper.
    </p>

    <form id="signin-form" class="form" novalidate>
      <input
        id="email"
        type="email"
        autocomplete="email"
        placeholder="Email"
        class="input"
        required
      />
      <input
        id="password"
        type="password"
        autocomplete="current-password"
        placeholder="Password"
        class="input"
        required
      />
      <button id="sign-in-btn" type="submit" class="btn btn-primary">
        Sign in
      </button>
    </form>

    <p id="signin-error" class="error-msg" role="alert"></p>

    <div class="divider"></div>

    <button class="btn btn-ghost js-open-app">
      Open companion app
    </button>

  </div>


  <!-- ── Connected view ────────────────────────────────────────────────── -->
  <div id="view-connected" class="popup view hidden">

    <div class="header">
      <img class="logo" src="icons/helper-active.svg" alt="" aria-hidden="true" />
      <div class="header-text">
        <div class="title">Streaming Helper</div>
      </div>
    </div>

    <div class="account-card">
      <div class="account-dot"></div>
      <div class="account-info">
        <div class="account-label">Connected</div>
        <div id="connected-email" class="account-email"></div>
      </div>
    </div>

    <button class="btn btn-primary js-open-app">
      Open companion app
    </button>

    <button id="disconnect-btn" class="btn btn-ghost btn-danger">
      Disconnect
    </button>

  </div>


  <!-- popup.js handles all state; no inline scripts (MV3 CSP) -->
  <script src="popup.js"></script>
</body>
</html>
