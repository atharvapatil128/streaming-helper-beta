<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streaming Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="logo">SH</div>
      <div class="header-text">
        <div class="title">Streaming Helper</div>
        <div class="version">Beta 1</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-card">
      <div class="status-dot"></div>
      <span class="status-text">Extension active</span>
    </div>

    <!-- Description -->
    <p class="desc">
      Navigate to a supported streaming site and the Streaming Helper
      overlay will appear automatically.
    </p>

    <!-- Supported sites list -->
    <div class="section-label">Supported sites</div>
    <ul class="sites">
      <li>
        <span class="site-dot" style="background:#e50914"></span>
        Netflix
      </li>
      <li>
        <span class="site-dot" style="background:#00a8e1"></span>
        Prime Video
      </li>
      <li>
        <span class="site-dot" style="background:#0063e5"></span>
        Disney+
      </li>
      <li>
        <span class="site-dot" style="background:#1ce783"></span>
        Hulu
      </li>
      <li>
        <span class="site-dot" style="background:#7851a9"></span>
        Max
      </li>
    </ul>

    <div class="footer">Beta 1 · Features coming soon</div>
  </div>
</body>
</html>
