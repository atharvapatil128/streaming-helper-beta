<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streaming Helper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div id="view-checking" class="popup view">
    <div class="header">
      <img class="logo" src="icons/helper-active.svg" alt="" aria-hidden="true" />
      <div class="header-text">
        <div class="title">Streaming Helper</div>
      </div>
    </div>
    <div class="checking-row" role="status">
      <span class="spinner" aria-hidden="true"></span>
      Checking your connection…
    </div>
  </div>

  <div id="view-problem" class="popup view hidden">
    <div class="header">
      <img class="logo" src="icons/helper-active.svg" alt="" aria-hidden="true" />
      <div class="header-text">
        <div class="title">Streaming Helper</div>
      </div>
    </div>
    <p id="connection-problem-message" class="desc" role="alert">
      We couldn’t verify your connection. Your saved session has not been removed.
    </p>
    <button id="retry-session-btn" class="btn btn-primary">Try again</button>
    <button class="btn btn-ghost js-open-app">Open companion app</button>
  </div>

  <!-- ── Not-connected / sign-in view ──────────────────────────────────── -->
  <div id="view-signin" class="popup view hidden">

    <div class="header">
      <img class="logo" src="icons/helper-active.svg" alt="" aria-hidden="true" />
      <div class="header-text">
        <div class="title">Streaming Helper</div>
      </div>
    </div>

    <p class="desc">
      Connect your account to show recommendations in the helper.
    </p>

    <form id="signin-form" class="form" novalidate>
      <label class="field-label" for="identifier">Username or email</label>
      <input
        id="identifier"
        type="text"
        autocomplete="username"
        placeholder="Username or email"
        class="input"
        required
      />
      <div class="field-label-row">
        <label class="field-label" for="password">Password</label>
        <a
          id="forgot-password-link"
          class="text-action"
          href="https://streaminghelper.net/?auth=forgot"
          target="_blank"
          rel="noopener noreferrer"
        >Forgot password?</a>
      </div>
      <div class="password-field">
        <input
          id="password"
          type="password"
          autocomplete="current-password"
          placeholder="Password"
          class="input"
          required
        />
        <button
          id="toggle-password-btn"
          type="button"
          class="password-toggle"
          aria-controls="password"
          aria-pressed="false"
          aria-label="Show password"
        >Show</button>
      </div>
      <button id="sign-in-btn" type="submit" class="btn btn-primary">
        Sign in
      </button>
    </form>

    <p id="signin-error" class="error-msg" role="alert"></p>

    <div class="divider"></div>

    <button class="btn btn-ghost js-open-app">
      Open companion app
    </button>

  </div>


  <!-- ── Connected view ────────────────────────────────────────────────── -->
  <div id="view-connected" class="popup view hidden">

    <div class="header">
      <img class="logo" src="icons/helper-active.svg" alt="" aria-hidden="true" />
      <div class="header-text">
        <div class="title">Streaming Helper</div>
      </div>
    </div>

    <div class="account-card">
      <div class="account-dot"></div>
      <div class="account-info">
        <div id="connected-status-label" class="account-label">Connected</div>
        <div id="connected-name" class="account-name"></div>
        <div id="connected-username" class="account-username hidden"></div>
      </div>
    </div>

    <p id="connected-error" class="connected-error" role="alert"></p>

    <button class="btn btn-primary js-open-app">
      Open companion app
    </button>

    <button id="disconnect-btn" class="btn btn-ghost btn-danger">
      Disconnect
    </button>

  </div>


  <!-- popup.js handles all state; no inline scripts (MV3 CSP) -->
  <script src="popup.js"></script>
</body>
</html>
